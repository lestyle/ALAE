workflows:
  ios-release:
    name: ALAE iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ALAE API Key
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Initialiser le trousseau
        script: |
          keychain initialize
      - name: Creer / recuperer le certificat et le profil (via cle API)
        script: |
          app-store-connect fetch-signing-files "com.alae.misbaha.ALAE" \
            --type IOS_APP_STORE \
            --create
      - name: Ajouter le certificat au trousseau
        script: |
          keychain add-certificates
      - name: Appliquer les profils au projet Xcode
        script: |
          xcode-project use-profiles
      - name: Construire l'IPA pour l'App Store
        script: |
          xcode-project build-ipa \
            --project "ALAE.xcodeproj" \
            --scheme "ALAE"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
