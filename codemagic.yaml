workflows:
  ios-release:
    name: ALAE iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ALAE API Key
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Trousseau
        script: |
          keychain initialize
      - name: Certificat et profil
        script: |
          openssl genrsa -out /tmp/ios_dist_key.pem 2048
          app-store-connect fetch-signing-files "com.alae.misbaha.ALAE" --type IOS_APP_STORE --certificate-key=@file:/tmp/ios_dist_key.pem --create
      - name: Ajouter certificat
        script: |
          keychain add-certificates
      - name: Profils
        script: |
          xcode-project use-profiles
      - name: Corriger le chemin du HTML dans le projet
        script: |
          HTML=$(find "$CM_BUILD_DIR" -name "Misbaha-Standalone.html" | head -1)
          echo "Fichier HTML trouve: $HTML"
          sed -i '' "s#/Downloads/Misbaha-Standalone.html#$HTML#g" ALAE.xcodeproj/project.pbxproj
          echo "Chemin corrige dans project.pbxproj"
      - name: Build IPA
        script: |
          xcode-project build-ipa --project "ALAE.xcodeproj" --scheme "ALAE"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
