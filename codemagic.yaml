workflows:
  ios-release:
    name: ALAE iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ALAE Build
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alae.misbaha.ALAE
      xcode: latest
      cocoapods: default
    scripts:
      - name: Configurer la signature (profils + certificat via cle API)
        script: |
          xcode-project use-profiles
      - name: Construire l'IPA pour l'App Store
        script: |
          xcode-project build-ipa \
            --project "ALAE.xcodeproj" \
            --scheme "ALAE"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
