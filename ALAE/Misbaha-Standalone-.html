                          <div style={{ position:'absolute', inset:2, borderRadius:'50%', background:'rgba(11,9,7,0.92)' }}/>
                        </div>
                        <div style={{ position:'absolute', top:-2, left:'50%', transform:'translateX(-50%)', width:5, height:5, borderRadius:'50%', background:'#FFE49A', boxShadow:'0 0 8px rgba(255,228,154,0.9)', zIndex:3 }}/>
                        <div style={{ position:'absolute', bottom:-1.5, left:'50%', transform:'translateX(-50%)', width:3.5, height:3.5, borderRadius:'50%', background:'#E8B97A', boxShadow:'0 0 6px rgba(232,185,122,0.8)', zIndex:3 }}/>
                        <div style={{ position:'relative', zIndex:2, display:'flex' }}>
                          <PrayerPhaseIcon phase={PHASE[i]} size={17} color="#FFD79A"/>
                        </div>
                      </div>
                    ) : (
                      <div style={{
                        width:34, height:34, borderRadius:10, flexShrink:0,
                        display:'flex', alignItems:'center', justifyContent:'center',
                        background:'rgba(199,165,91,0.06)',
                        border:'0.5px solid rgba(199,165,91,0.12)',
                      }}>
                        <PrayerPhaseIcon phase={PHASE[i]} size={18} color={T.gold}/>
                      </div>
                    )}

                    {/* name */}
                    <div style={{ flex:1, display:'flex', flexDirection:'column', gap:1, alignItems:'flex-start' }}>
                      <div style={{
                        fontFamily:isAr ? 'Cairo, sans-serif' : 'Inter, sans-serif',
                        fontSize:isAr ? 18 : 14.5, fontWeight:isAr ? 700 : 600,
                        color:isNext ? T.goldLight : T.text, lineHeight:1.25,
                        textShadow:'0 1px 3px rgba(0,0,0,0.6)',
                      }}>{labels[i]}</div>
                      {lang !== 'ar' && (
                        <div style={{ fontFamily:'Amiri, serif', fontSize:12.5, color:'rgba(232,185,122,0.55)', direction:'rtl', lineHeight:1 }}>

                        </div>
                      )}
                    </div>

                    {/* time + status */}
                    <div style={{ display:'flex', flexDirection:'column', alignItems:isAr ? 'flex-start' : 'flex-end', gap:2, minWidth:62 }}>
                      <div style={{
                        fontFamily:'"DM Serif Display",serif', fontSize:21, fontWeight:400,
                        color:isNext ? '#fff' : (isPast ? T.text : T.goldLight), lineHeight:1,
                        fontVariantNumeric:'tabular-nums', letterSpacing:'0.01em',
                      }}>{t}</div>
                      {isNext && (
                        <div style={{
                          fontFamily: isAr ? 'Cairo, sans-serif' : 'Inter, sans-serif', fontSize: isAr ? 12 : 10, fontWeight:700, letterSpacing:'0.04em',

                      )}
                      {isPast && (
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">

                      )}
                    </div>

                );
              })}
            </div>
          </>
        )}
      </div>
      </div>
    </div>
  );
}

// ─── Sun-phase icons (1px gold line set) ──────────────────────────────
function PrayerPhaseIcon({ phase, size = 18, color = '#E2C783' }) {
  const p = { width:size, height:size, viewBox:'0 0 24 24', fill:'none', stroke:color, strokeWidth:1.3, strokeLinecap:'round', strokeLinejoin:'round' };
  switch (phase) {
    case 'fajr': // dawn — sun rising at horizon
      return (
        <svg {...p}>
          <line x1="3" y1="19" x2="21" y2="19"/>
          <path d="M7 19a5 5 0 0 1 10 0"/>
          <path d="M12 5.5v2M5.2 8.2l1.3 1.3M18.8 8.2l-1.3 1.3"/>
        </svg>
      );
    case 'sunrise': // sun fully up with arrow
      return (
        <svg {...p}>
          <line x1="3" y1="19" x2="21" y2="19"/>
          <circle cx="12" cy="13" r="3.4"/>
          <path d="M12 4.5v2.4M4.7 9.2l1.5 1M19.3 9.2l-1.5 1"/>
          <path d="M9.7 16h4.6"/>
        </svg>
      );
    case 'dhuhr': // high sun
      return (
        <svg {...p}>
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 3v2.2M12 18.8V21M3 12h2.2M18.8 12H21M5.6 5.6l1.6 1.6M16.8 16.8l1.6 1.6M5.6 18.4l1.6-1.6M16.8 7.2l1.6-1.6"/>
        </svg>
      );
    case 'asr': // afternoon — lower sun, long rays
      return (
        <svg {...p}>
          <circle cx="12" cy="13" r="3.6"/>
          <path d="M12 4v2M4.5 9l1.6 1.1M19.5 9l-1.6 1.1M3.2 16.5H6M18 16.5h2.8"/>
        </svg>
      );
    case 'maghrib': // sunset — sun dipping below horizon
      return (
        <svg {...p}>

                     L ${cx - 6} ${cy - 36}
                     L ${cx - 3} ${cy + 8}
                     L ${cx + 3} ${cy + 8}
                     L ${cx + 6} ${cy - 36} Z`}
            fill={isAligned ? 'url(#qArrowNeon)' : 'url(#qArrow)'}

        </g>

        {/* Center hub with kaaba miniature */}
        <circle cx={cx} cy={cy} r="13" fill="url(#qHub)" stroke="#5E3A18" strokeWidth="0.8"/>

      </svg>
    </div>
  );
}

// Sépare l'isti'adha et la basmala (et le "قُل" des sourates) en lignes centrées,
// puis justifie le corps du verset — comme la mise en page d'un Mushaf.
function splitQuranLead(text) {
  const stripH = s => s
    .replace(/[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06ED\u0640]/g, '')
    .replace(/\s+/g, ' ').trim();
  const ISTI = 'أعوذ بالله من الشيطان الرجيم';
  const BASM = 'بسم الله الرحمن الرحيم';
  let parts = text.split('،').map(s => s.trim()).filter(Boolean);
  const leads = [];
  while (parts.length > 1) {
    const n = stripH(parts[0]);
    if (n === ISTI || n === BASM) leads.push(parts.shift());
    else break;
  }
  return { leads, body: parts.join(' ، ') };
}

function AdhkarScreen({ lang = 'ar' }) {
  const T = window.THEME;
  const isAr = lang === 'ar';

  // Choose default tab based on time of day
  const hour = new Date().getHours();
  const defaultTab = (hour >= 5 && hour < 17) ? 'morning' : 'evening';
  const [tab, setTab] = React.useState(defaultTab);
  const [counters, setCounters] = React.useState({}); // { 'morning-0': 3, ... }

  const list = window.ADHKAR[tab];

  const titles = {
    morning: { ar: 'أَذكَار الصَّبَاح', fr: 'Adhkar du matin', en: 'Morning adhkar', nl: 'Ochtend-adhkar' },
    evening: { ar: 'أَذكَار المَسَاء', fr: 'Adhkar du soir', en: 'Evening adhkar', nl: 'Avond-adhkar' },
  };

  const tap = (idx) => {
    const key = `${tab}-${idx}`;
    const cur = counters[key] || 0;
    const target = list[idx].t;
    if (cur >= target) return;
    if (navigator.vibrate) try { navigator.vibrate(6); } catch {}
    const next = cur + 1;
    setCounters({ ...counters, [key]: next });
    if (next === target && navigator.vibrate) {
      try { navigator.vibrate([20, 60, 100]); } catch {}
    }
  };

  const reset = (idx) => {
    const key = `${tab}-${idx}`;
    setCounters({ ...counters, [key]: 0 });
  };

  return (
    <div style={{ position:'absolute', inset:0, background:T.bg, overflow:'hidden', direction: isAr ? 'rtl' : 'ltr' }}>
      <window.SilkBg opacity={0.9} />
      <style>{`
        @font-face { font-family: 'QPC'; src: url('fonts/QPC-V2.woff2') format('woff2'); font-weight: 400; font-display: swap; }
        .adhkar-scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }
        .adhkar-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .settings-scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }
        .settings-scroll { -ms-overflow-style: none; scrollbar-width: none; }
      `}</style>

      {/* Top header */}
      <div style={{ position:'relative', zIndex:2, padding:'58px 20px 16px' }}>
        <div style={{ textAlign:'center', marginBottom:18 }}>
          <div style={{ fontFamily:'Amiri, serif', fontSize:30, color:T.text, fontWeight:700, letterSpacing:'0.01em', lineHeight:1.55, padding:'6px 0 4px', overflow:'visible' }}>
            {titles[tab][lang] || titles[tab].ar}
          </div>
          <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:16, marginTop:12, opacity:0.9 }}>
            <div style={{ width:5, height:5, transform:'rotate(45deg)', background:'#F4D89B', boxShadow:'0 0 5px rgba(255,225,150,0.85), 0 1px 2px rgba(0,0,0,0.6)', animation:'starSparkle 2.4s ease-in-out infinite', animationDelay:'0s' }}/>
            <div style={{ width:7, height:7, transform:'rotate(45deg)', background:'#FFE9B8', boxShadow:'0 0 7px rgba(255,225,150,0.95), 0 1px 2px rgba(0,0,0,0.6)', animation:'starSparkle 2.4s ease-in-out infinite', animationDelay:'0.5s' }}/>
            <div style={{ width:5, height:5, transform:'rotate(45deg)', background:'#F4D89B', boxShadow:'0 0 5px rgba(255,225,150,0.85), 0 1px 2px rgba(0,0,0,0.6)', animation:'starSparkle 2.4s ease-in-out infinite', animationDelay:'1s' }}/>
          </div>
        </div>

        {/* Tab switcher */}
        <div style={{
          display:'flex', gap:0, margin:'0 auto', maxWidth:280,
          background:'rgba(11,13,16,0.5)', borderRadius:99,
          border:'0.5px solid rgba(232,200,140,0.22)',
          backdropFilter:'blur(10px)', WebkitBackdropFilter:'blur(10px)',
          padding:4,
        }}>
          {['morning','evening'].map(t => (
            <button key={t} onClick={() => setTab(t)} style={{
              flex:1, padding:'9px 14px', borderRadius:99, border:'none', cursor:'pointer',
              fontFamily:'Amiri, serif', fontSize:14, fontWeight:700,
              background: tab === t ? 'linear-gradient(165deg, #FBE6AE 0%, #E8B97A 42%, #C68A3C 100%)' : 'transparent',
              color: tab === t ? '#2A1A08' : T.textMuted,
              transition:'all 0.25s ease',

              {t === 'morning' ? (isAr ? 'الصَّبَاح' : 'Matin') : (isAr ? 'المَسَاء' : 'Soir')}
            </button>
          ))}
        </div>

        position:'absolute', top:228, left:0, right:0, bottom:30,

        WebkitOverflowScrolling:'touch',
        touchAction:'pan-y',

        {list.map((d, i) => {
          const key = `${tab}-${i}`;
          const count = counters[key] || 0;
          const done = count >= d.t;
          const progress = d.t > 0 ? count / d.t : 0;
          return (
            <div
              key={i}
              onClick={() => tap(i)}
              style={{
                marginBottom:14, padding:'18px 18px 14px', borderRadius:18,
                background: done
                  ? 'linear-gradient(180deg, rgba(40,90,68,0.82), rgba(30,72,54,0.78))'
                  : 'linear-gradient(180deg, rgba(12,9,5,0.88), rgba(10,7,4,0.84))',

              {/* Progress fill bar at bottom */}
              <div style={{

                background: done

                transition:'width 0.3s cubic-bezier(.2,.7,.3,1)',
                borderRadius: '0 2px 2px 0',
                boxShadow: '0 0 8px rgba(232,185,122,0.4)',
              }}/>

              {/* Header row: number + counter */}
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                <div style={{
                  fontFamily:'Inter, sans-serif', fontSize:10, letterSpacing:'0.18em',
                  color: T.gold, opacity: 0.6, fontWeight:600,
                }}>{String(i+1).padStart(2,'0')} / {String(list.length).padStart(2,'0')}</div>
                <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                  {done && (
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                      <circle cx="9" cy="9" r="8" fill="#4A8A6F"/>
                      <path d="M5 9.5L8 12.5L13.5 6.5" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>

                  <div style={{
                    display:'flex', alignItems:'baseline', gap:4,
                    fontFamily:'"DM Serif Display","Cormorant Garamond",serif',
                  }}>
                    <span style={{
                      fontSize:22, fontWeight:400,
                      background: done
                        ? `linear-gradient(180deg, #5BAA88, #4A8A6F)`
                        : `linear-gradient(180deg, ${T.goldLight}, ${T.gold}, ${T.goldDark})`,
                      WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                      lineHeight:1, letterSpacing:'-0.02em',

                    <span style={{ fontSize:11, color:T.textMuted, letterSpacing:'0.1em' }}>×{d.t}</span>
                  </div>
                </div>
              </div>

              {/* Arabic text — tout en QPC V2, layout Mushaf pour les versets */}
              {(() => {
                const fontStack = '"QPC","Amiri Quran","Amiri",serif';
                const { leads, body } = splitQuranLead(d.ar);
                return (
                  <div style={{ marginBottom:12, opacity: done ? 0.85 : 1 }}>
                    {leads.map((ln, k) => (
                      <div key={k} style={{
                        fontFamily: fontStack,
                        fontSize: k === 0 ? 18 : 20, lineHeight: 1.9,
                        color: T.gold, direction:'rtl', textAlign:'center', fontWeight:400,
                        textShadow:'0 1px 8px rgba(0,0,0,0.4)',
                        opacity: 0.92, marginBottom: 2,
                      }}>{ln}</div>
                    ))}
                    {leads.length > 0 && (
                      <div style={{ display:'flex', justifyContent:'center', margin:'6px 0 10px' }}>
                        <div style={{ width:46, height:1, background:`linear-gradient(90deg, transparent, ${T.gold}, transparent)`, opacity:0.5 }}/>
                      </div>
                    )}
                    <div style={{
                      fontFamily: fontStack,
                      fontSize: 23, lineHeight: 2.05,
                      color: T.text, direction:'rtl', textAlign:'justify', textAlignLast:'center',
                      fontWeight: 400, textShadow:'0 1px 10px rgba(0,0,0,0.4)',
                    }}>{body}</div>
                  </div>
                );
              })()}

              {/* Reference */}
              <div style={{
                fontFamily:'Amiri, serif', fontSize:12, color:T.textDim,
                direction:'rtl', textAlign: isAr ? 'left' : 'right',
              }}>{d.ref}</div>

              {/* Reset button (only if count > 0) */}
              {count > 0 && !done && (
                <button
                  onClick={(e) => { e.stopPropagation(); reset(i); }}
                  style={{
                    position:'absolute', top:14, [isAr ? 'left' : 'right']:14,
                    background:'transparent', border:'none', color:T.textDim,
                    cursor:'pointer', padding:6, fontSize:11, fontFamily:'Amiri, serif',
                  }}>
                  ↻
                </button>
              )}
            </div>
          );
        })}

        {/* Footer hint */}
        <div style={{ textAlign:'center', padding:'16px 0 24px', fontFamily:'Amiri, serif', fontSize:13, color:T.textDim }}>
          {isAr ? 'اضغط على الذكر لعدّه' : (lang === 'fr' ? 'Tape sur le dhikr pour compter' : lang === 'nl' ? 'Tik op de dhikr om te tellen' : 'Tap a dhikr to count')}
        </div>
      </div>
    </div>
  );
}

window.getDuaaOccasion = function (date) {
  const now = date || new Date();
  let h = null;
  try {
    const fmt = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', { day:'numeric', month:'numeric' });
    const parts = {}; fmt.formatToParts(now).forEach(p => { parts[p.type] = p.value; });
    h = { d: parseInt(parts.day, 10), m: parseInt(parts.month, 10) };
    if (isNaN(h.d) || isNaN(h.m)) h = null;
  } catch (e) { h = null; }

  const TAKBIR = {
    ar: 'اللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ، لَا إِلَٰهَ إِلَّا اللَّهُ، وَاللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ، وَلِلَّهِ الْحَمْدُ',
    fr: 'Allah est le plus grand, Allah est le plus grand. Nulle divinité sauf Allah. Allah est le plus grand, Allah est le plus grand, et à Allah la louange.',
    en: 'Allah is the greatest, Allah is the greatest. There is no god but Allah. Allah is the greatest, Allah is the greatest, and to Allah be praise.',
    nl: 'Allah is de grootste, Allah is de grootste. Er is geen god dan Allah. Allah is de grootste, Allah is de grootste, en aan Allah de lof.',
    ref: 'تَكْبِيرُ العِيد',
  };

  const O = {
    arafah: {
      id:'arafah', icon:'🕋',
      banner:{ ar:'يَوْمُ عَرَفَة', fr:'Jour de Arafat', en:'Day of Arafah', nl:'Dag van Arafah' },
      duaa:{
        ar:'لَا إِلَٰهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ',
        fr:'Nulle divinité sauf Allah, Seul, sans associé. À Lui la royauté, à Lui la louange, et Il est Puissant sur toute chose.',
        en:'There is no god but Allah alone, without partner. His is the dominion and His the praise, and He is able to do all things.',
        nl:'Er is geen god dan Allah alleen, zonder deelgenoot. Aan Hem het koninkrijk en de lof, en Hij is tot alles in staat.',
        ref:'الترمذي',
      },
    },
    eidAdha: {
      id:'eidAdha', icon:'🌙',
      banner:{ ar:'عِيدُ الأَضْحَىٰ مُبَارَك', fr:'Aïd al-Adha Moubarak', en:'Eid al-Adha Mubarak', nl:'Eid al-Adha Mubarak' },
      duaa: TAKBIR,
    },
    dhulhijja: {
      id:'dhulhijja', icon:'🌙',
      banner:{ ar:'عَشْرُ ذِي الحِجَّة', fr:'Les 10 jours de Dhul-Hijja', en:'First 10 days of Dhul-Hijjah', nl:'Eerste 10 dagen van Dhul-Hijja' },
      duaa:{
        ar:'سُبْحَانَ اللَّهِ، وَالْحَمْدُ لِلَّهِ، وَلَا إِلَٰهَ إِلَّا اللَّهُ، وَاللَّهُ أَكْبَرُ',
        fr:'Gloire à Allah, louange à Allah, nulle divinité sauf Allah, et Allah est le plus grand.',
        en:'Glory be to Allah, praise be to Allah, there is no god but Allah, and Allah is the greatest.',
        nl:'Glorie aan Allah, lof aan Allah, er is geen god dan Allah, en Allah is de grootste.',
        ref:'ذِكْرُ العَشْر',
      },
    },
    eidFitr: {
      id:'eidFitr', icon:'🌙',
      banner:{ ar:'عِيدُ الفِطْرِ مُبَارَك', fr:'Aïd al-Fitr Moubarak', en:'Eid al-Fitr Mubarak', nl:'Eid al-Fitr Mubarak' },
      duaa: TAKBIR,
    },
    ramadan: {
      id:'ramadan', icon:'🌙',
      banner:{ ar:'رَمَضَانُ مُبَارَك', fr:'Ramadan Moubarak', en:'Ramadan Mubarak', nl:'Ramadan Mubarak' },
      duaa:{
        ar:'اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي',
        fr:'Ô Allah, Tu es Pardonneur et Tu aimes le pardon, pardonne-moi donc.',
        en:'O Allah, You are Most Forgiving and love forgiveness, so forgive me.',
        nl:'O Allah, U bent Vergevingsgezind en houdt van vergeving, vergeef mij dus.',
        ref:'الترمذي',
      },
    },
    ashura: {
      id:'ashura', icon:'🌙',
      banner:{ ar:'يَوْمُ عَاشُورَاء', fr:'Jour de Achoura', en:'Day of Ashura', nl:'Dag van Ashura' },
      duaa:{
        ar:'رَبَّنَا تَقَبَّلْ مِنَّا إِنَّكَ أَنْتَ السَّمِيعُ الْعَلِيمُ',
        fr:'Notre Seigneur, accepte de nous. Tu es l’Audient, l’Omniscient.',
        en:'Our Lord, accept from us. You are the All-Hearing, the All-Knowing.',
        nl:'Onze Heer, aanvaard het van ons. U bent de Alhorende, de Alwetende.',
        ref:'البقرة ١٢٧',
      },
    },
    newYear: {
      id:'newYear', icon:'🌙',
      banner:{ ar:'عَامٌ هِجْرِيٌّ جَدِيد', fr:'Bonne année hégirienne', en:'Happy Hijri New Year', nl:'Gelukkig Hijri-nieuwjaar' },
      duaa:{
        ar:'اللَّهُمَّ أَهِلَّهُ عَلَيْنَا بِالْيُمْنِ وَالْإِيمَانِ، وَالسَّلَامَةِ وَالْإِسْلَامِ، رَبِّي وَرَبُّكَ اللَّهُ',
        fr:'Ô Allah, fais lever ce mois sur nous avec la bénédiction, la foi, la sécurité et l’Islam. Mon Seigneur et ton Seigneur est Allah.',
        en:'O Allah, bring it upon us with blessing, faith, safety and Islam. My Lord and your Lord is Allah.',
        nl:'O Allah, laat het over ons opkomen met zegen, geloof, veiligheid en islam. Mijn Heer en jouw Heer is Allah.',
        ref:'الترمذي',
      },
    },
    friday: {
      id:'friday', icon:'✦',
      banner:{ ar:'يَوْمُ الجُمُعَة', fr:'Vendredi béni', en:'Blessed Friday', nl:'Gezegende vrijdag' },
      duaa:{
        ar:'اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَىٰ نَبِيِّنَا مُحَمَّدٍ',
        fr:'Ô Allah, prie et accorde le salut sur notre Prophète Muhammad ﷺ.',
        en:'O Allah, send blessings and peace upon our Prophet Muhammad ﷺ.',
        nl:'O Allah, schenk zegeningen en vrede aan onze Profeet Mohammed ﷺ.',
        ref:'فَضْلُ الجُمُعَة',
      },
    },
  };

  if (h) {
    if (h.m === 12 && h.d === 9) return O.arafah;
    if (h.m === 12 && h.d >= 10 && h.d <= 13) return O.eidAdha;
    if (h.m === 12 && h.d >= 1 && h.d <= 8) return O.dhulhijja;
    if (h.m === 10 && h.d >= 1 && h.d <= 3) return O.eidFitr;
    if (h.m === 9) return O.ramadan;
    if (h.m === 1 && h.d === 10) return O.ashura;
    if (h.m === 1 && h.d === 1) return O.newYear;
  }
  return null;
};

function DuaaScreen({ lang = 'ar', randomDuaa = false, onTap }) {
  const T = window.THEME;
  const isAr = lang === 'ar';

  // Pick: random (for splash mode) or day-of-year (for menu mode)
  const duaaIdx = React.useMemo(() => {
    if (randomDuaa) {
      return Math.floor(Math.random() * window.DUAA_LIST.length);
    }
    const now = new Date();
    const startOfYear = new Date(now.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((now - startOfYear) / 86400000);
    return dayOfYear % window.DUAA_LIST.length;
  }, [randomDuaa]);
  const occasion = React.useMemo(() => (window.getDuaaOccasion ? window.getDuaaOccasion() : null), []);
  const duaa = (occasion && occasion.duaa) ? occasion.duaa : window.DUAA_LIST[duaaIdx];

  const now = new Date();
  const dateStr = now.toLocaleDateString(lang === 'ar' ? 'ar-u-nu-latn' : (lang === 'fr' ? 'fr-FR' : lang === 'nl' ? 'nl-NL' : 'en-US'), {
    weekday: 'long', day: 'numeric', month: 'long'
  });

  const L = {
    fr: { eyebrow:"DOU'A DU JOUR", sub:'Une invocation chaque jour', share:'Partager', meaning:'Sens' },
    en: { eyebrow:"TODAY'S DUAA", sub:'One invocation a day', share:'Share', meaning:'Meaning' },
    ar: { eyebrow:'دُعَاء اليَوم', sub:'دعاء جديد كل يوم', share:'مشاركة', meaning:'المعنى' },
    nl: { eyebrow:'DUA VAN DE DAG', sub:'Elke dag een smeekbede', share:'Delen', meaning:'Betekenis' },
  }[lang] || {};

  const greeting = React.useMemo(() => {
    const hr = new Date().getHours();
    // صباح jusqu'à ~13h · مساء ensuite — affiché toute la journée
    if (hr >= 3 && hr < 13) return { ar:'صَبَاحُ الخَيْر', fr:'Bonjour', en:'Good morning', nl:'Goedemorgen' };
    return { ar:'مَسَاءُ الخَيْر', fr:'Bonsoir', en:'Good evening', nl:'Goedenavond' };
  }, []);

  const [shareToast, setShareToast] = React.useState('');
  const handleShare = (e) => {
    if (e) e.stopPropagation();
    const text = `${duaa.ar}\n\n${duaa[lang] || duaa.fr}\n— آلَاء`;
    const okMsg = isAr ? 'تمّت المشاركة' : (lang === 'fr' ? 'Partagé' : 'Shared');
    const copyMsg = isAr ? 'تمّ نسخ الدعاء' : (lang === 'fr' ? 'Dou\'a copié' : 'Copied');
    if (navigator.vibrate) try { navigator.vibrate(10); } catch (e2) {}
    // 1) Pont natif iOS
    try {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.alae) {
        window.webkit.messageHandlers.alae.postMessage({ type:'share', text, url:'https://www.lestyle.be' });
        return;
      }
    } catch (e2) {}
    const copyAndToast = () => {
      try { navigator.clipboard.writeText(text); } catch (e2) {}
      setShareToast(copyMsg);
      setTimeout(() => setShareToast(''), 1800);
    };
    // 2) Web Share API (si dispo et autorisé)
    if (navigator.share) {
      navigator.share({ title: L.eyebrow, text })
        .then(() => { setShareToast(okMsg); setTimeout(() => setShareToast(''), 1800); })
        .catch((err) => { if (!err || err.name !== 'AbortError') copyAndToast(); });
      return;
    }
    // 3) Copie presse-papier + toast
    copyAndToast();
  };

  return (
    <div
      style={{ position:'absolute', inset:0, background:T.bg, overflow:'hidden', direction: isAr ? 'rtl' : 'ltr', cursor: onTap ? 'pointer' : 'default' }}
      onClick={onTap}
    >
      <window.SilkBg opacity={0.9} />
      <style>{`
        @font-face { font-family: 'QPC'; src: url('fonts/QPC-V2.woff2') format('woff2'); font-weight: 400; font-display: swap; }
        @keyframes duaaShine {
          0% { transform: translateX(-130%) skewX(-18deg); opacity: 0; }
          22% { opacity: 0.85; }
          55% { opacity: 0.85; }
          100% { transform: translateX(230%) skewX(-18deg); opacity: 0; }
        }
        @keyframes duaaGlow {
          0%,100% { box-shadow: 0 10px 26px rgba(120,70,15,0.5), 0 2px 6px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,244,200,0.9), inset 0 -2px 6px rgba(120,60,10,0.5); }
          50% { box-shadow: 0 12px 34px rgba(201,124,46,0.6), 0 2px 6px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,244,200,0.95), inset 0 -2px 6px rgba(120,60,10,0.5); }
        }
      `}</style>
      <div style={{ position:'absolute', inset:0, background:'radial-gradient(ellipse 90% 80% at 50% 50%, rgba(11,13,16,0.02), rgba(11,13,16,0.14))', zIndex:1 }}/>

      <div style={{ position:'relative', zIndex:2, padding: onTap ? '120px 22px 40px' : '96px 22px 40px', height:'100%', boxSizing:'border-box', display:'flex', flexDirection:'column' }}>

        {/* Header */}
        <div style={{ textAlign:'center', marginBottom:22 }}>
          {occasion && (() => {
            const isEid = occasion.id === 'eidFitr' || occasion.id === 'eidAdha';
            return (
            <div style={{
              display:'inline-flex', alignItems:'center', gap: isEid ? 12 : 9, marginBottom:16,
              padding: isEid ? '9px 22px' : '7px 18px', borderRadius:999,
              background: isEid
                ? 'linear-gradient(180deg, rgba(255,228,150,0.42), rgba(214,142,54,0.30))'
                : 'linear-gradient(180deg, rgba(247,206,132,0.24), rgba(201,124,46,0.16))',
              border: isEid ? '0.5px solid rgba(255,224,150,0.85)' : '0.5px solid rgba(232,200,140,0.55)',
              boxShadow: isEid
                ? '0 4px 22px rgba(214,142,54,0.5), 0 0 14px rgba(255,214,120,0.4), inset 0 1px 0 rgba(255,245,210,0.6)'
                : '0 3px 16px rgba(201,124,46,0.30), inset 0 1px 0 rgba(255,240,200,0.35)',
              fontFamily:'"ArefRuqaa","Amiri",serif', fontSize: isEid ? 21 : 19, fontWeight:700,
              color:'#FBEDC4', letterSpacing:'0.01em', direction: isAr ? 'rtl' : 'ltr',
              whiteSpace:'nowrap', maxWidth:'92%',
              filter: isEid ? 'drop-shadow(0 0 11px rgba(255,205,110,0.6))' : 'drop-shadow(0 0 7px rgba(232,185,122,0.35))',
              position:'relative', overflow:'hidden',
              animation: isEid ? 'eidBannerGlow 2.6s ease-in-out infinite' : 'none',
            }}>
              {isEid && (
                <span style={{
                  position:'absolute', inset:0, pointerEvents:'none',

              )}
              {isEid
                ? <span style={{ fontSize:15, filter:'drop-shadow(0 0 4px rgba(255,220,140,0.8))' }}>✦</span>

              <span style={{ position:'relative', zIndex:1 }}>{occasion.banner[lang] || occasion.banner.ar}</span>
              {isEid && <span style={{ fontSize:15, filter:'drop-shadow(0 0 4px rgba(255,220,140,0.8))' }}>✦</span>}
            </div>
            );
          })()}
          <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:16, marginBottom:14 }}>
            <div style={{ width:5, height:5, transform:'rotate(45deg)', background:'#F4D89B', boxShadow:'0 0 5px rgba(255,225,150,0.85), 0 1px 2px rgba(0,0,0,0.6)', animation:'starSparkle 2.4s ease-in-out infinite', animationDelay:'0s' }}/>
            <div style={{ width:7, height:7, transform:'rotate(45deg)', background:'#FFE9B8', boxShadow:'0 0 7px rgba(255,225,150,0.95), 0 1px 2px rgba(0,0,0,0.6)', animation:'starSparkle 2.4s ease-in-out infinite', animationDelay:'0.5s' }}/>
            <div style={{ width:5, height:5, transform:'rotate(45deg)', background:'#F4D89B', boxShadow:'0 0 5px rgba(255,225,150,0.85), 0 1px 2px rgba(0,0,0,0.6)', animation:'starSparkle 2.4s ease-in-out infinite', animationDelay:'1s' }}/>
          </div>
          <div style={{
            fontFamily:'"ArefRuqaa","Amiri",serif', fontSize:38, fontWeight:700,
            background:'linear-gradient(180deg, #FFF1C8 0%, #F4D89B 25%, #E8B97A 55%, #C7935B 85%, #7E5025 100%)',
            WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text',
            lineHeight:1, letterSpacing:'0.02em',

  // ─── Screen wrapper: adds a working back button overlay ────────────
  function ScreenWithBack({ children, onBack, isAr, backTop, bare }) {

      <>

  // ─── Onboarding flow — each step is a mini-tasbih: tap button = +1, target reached → next step ──
  function FirstRun({ lang, setLang, onDone, onSettings, onMenu, onBrightness }) {
    const [step, setStep] = useState(0);
    const [count, setCount] = useState(0);
    const I = window.I18N[lang];
    const isAr = lang === 'ar';

    // Targets per onboarding step (correspond to dhikrs shown on screen)
    const targets = [33, 33, 100]; // subhanAllah=33, La ilaha=33, astaghfirullah=100

    const handleTap = () => {
      const target = targets[step];
      const next = count + 1;
      // Haptic feedback
      if (navigator.vibrate) try { navigator.vibrate(8); } catch {}
      if (next >= target) {
        // Cycle complete — vibrate stronger and advance
        if (navigator.vibrate) try { navigator.vibrate([20, 60, 100]); } catch {}
        if (step < 2) {
          setTimeout(() => {
            setStep(step + 1);
            setCount(0);
          }, 400);
          setCount(next);
        } else {
          // Last step — finish onboarding
          setTimeout(() => onDone(), 500);
          setCount(next);
        }
      } else {
        setCount(next);
      }
    };

    // Navigation par glissement (swipe) — comme les autres pages
    const goNextStep = () => { if (step < 2) { setStep(step + 1); setCount(0); } else { onDone(); } };
    const goPrevStep = () => { if (step > 0) { setStep(step - 1); setCount(0); } };
    const sw = React.useRef({ x:0, y:0, down:false, swiped:false });
    const onPointerDown = (e) => { sw.current = { x:e.clientX||0, y:e.clientY||0, down:true, swiped:false }; };
    const onPointerMove = (e) => {
      if (!sw.current.down || sw.current.swiped) return;
      const dx = (e.clientX||0) - sw.current.x;
      const dy = (e.clientY||0) - sw.current.y;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.3) {
        sw.current.swiped = true;
        if (dx < 0) goNextStep(); else goPrevStep();
      }
    };
    const onPointerUp = () => { sw.current.down = false; };

    return (
      <div style={{ position:'absolute', inset:0 }}
        onPointerDown={onPointerDown} onPointerMove={onPointerMove}
        onPointerUp={onPointerUp} onPointerLeave={onPointerUp}>
        <window.Onboarding
          step={step}
          lang={lang}
          count={count}
          target={targets[step]}
          onContinue={handleTap}
          onMenu={onMenu}
          onBrightness={onBrightness}
          onSkip={onDone}
        />
      </div>
    );
  }

  // ─── Top-level app ─────────────────────────────────────────────────
  function MisbahaApp() {
    const [state, setState] = useState(() => loadState());
    const [route, setRoute] = useState('compteur');
    const [drawerOpen, setDrawerOpen] = useState(false);
    const [showSplash, setShowSplash] = useState(false);
    const [showDuaa, setShowDuaa] = useState(true);
    const [bootDone, setBootDone] = useState(() => (typeof window !== 'undefined' && !!window.__bootIntroDone));
    const [forceOnboarding, setForceOnboarding] = useState(false);
    const [showNiyya, setShowNiyya] = useState(true);
    const [brightness, setBrightness] = useState(() => loadState().brightness ?? 1);
    const [darkMode, setDarkMode] = useState(() => loadState().darkMode || 'off');
    const [theme, setTheme] = useState(() => loadState().theme || 'gold');
    const [showCustomModal, setShowCustomModal] = useState(false);
    const [editingDhikr, setEditingDhikr] = useState(null);
    const [showDhikrDetail, setShowDhikrDetail] = useState(null);
    const [nightToast, setNightToast] = useState(false);

    // Listen for darkMode/theme setting changes from Settings page
    useEffect(() => {
      const sync = () => {
        const s = loadState();
        const m = s.darkMode || 'off';
        const t = s.theme || 'gold';
        if (m !== darkMode) setDarkMode(m);
        if (t !== theme) setTheme(t);
      };
      const id = setInterval(sync, 800);
      window.addEventListener('storage', sync);
      return () => { clearInterval(id); window.removeEventListener('storage', sync); };
    }, [darkMode, theme]);

    // Compute effective dark state (auto = night 18h-6h)
    const isNightMode = darkMode === 'on' ||
      (darkMode === 'auto' && (() => { const h = new Date().getHours(); return h >= 18 || h < 6; })());

    // ── Toast quand le mode nuit se déclenche (boot la nuit OU bascule jour→nuit) ──
    const prevNightRef = React.useRef(undefined);
    useEffect(() => {
      const prev = prevNightRef.current;
      // affiche au tout premier rendu si on est déjà la nuit, ou à chaque bascule false→true
      if (isNightMode && prev !== true) {
        setNightToast(true);
        const id = setTimeout(() => setNightToast(false), 3800);
        prevNightRef.current = isNightMode;
        return () => clearTimeout(id);
      }
      prevNightRef.current = isNightMode;
    }, [isNightMode]);

    // Apply theme + night mode + brightness — combinés (la luminosité marche TOUJOURS)
    useEffect(() => {
      const root = document.documentElement;
      // Teinte de base selon le thème
      let hue = '', sat = 1.32, con = 1.13, veilRGB = '11,13,16';
      if (theme === 'bordeaux') { hue = ' hue-rotate(-18deg)'; sat = 0.95; con = 1.03; veilRGB = '34,22,12'; }
      else if (theme === 'rose') { hue = ' hue-rotate(-58deg)'; sat = 1.1; con = 1.03; veilRGB = '42,16,24'; }
      else if (theme === 'copper') { hue = ' hue-rotate(-9deg)'; sat = 1.34; con = 1.12; veilRGB = '30,16,9'; }
      // Multiplicateur de luminosité (0=tamisé · 1=normal · 2=lumineux)
      const brMult = [0.55, 0.74, 0.84][brightness] != null ? [0.55, 0.74, 0.84][brightness] : 0.74;
      const veilA  = [0.46, 0.40, 0.33][brightness] != null ? [0.46, 0.40, 0.33][brightness] : 0.40;
      let mult = brMult, a = veilA, s2 = sat;
      if (isNightMode) { mult = brMult * 0.6; a = Math.min(0.86, veilA + 0.34); if (!hue) s2 = 0.85; }
      root.style.setProperty('--silk-filter', `brightness(${mult.toFixed(2)}) saturate(${s2}) contrast(${con})${hue}`);
      root.style.setProperty('--silk-veil', `rgba(${veilRGB},${a.toFixed(2)})`);
    }, [brightness, isNightMode, theme]);

    // Expose to compteur Header tap
    React.useEffect(() => {
      window.__openDhikrDetail = (idx) => setShowDhikrDetail(idx);
      return () => { delete window.__openDhikrDetail; };
    }, []);

    // Hydrate window.DHIKRS with saved user-created dhikrs on first boot
    useEffect(() => {
      try {
        const s = loadState();
        if (Array.isArray(s.userDhikrs)) {
          const existingIds = new Set(window.DHIKRS.map(d => d.id));
          for (const d of s.userDhikrs) {
            if (!existingIds.has(d.id)) window.DHIKRS.push(d);
          }
        }
      } catch {}
    }, []);

    // Langue verrouillée sur une clé réellement présente dans I18N (sinon fallback 'ar') — évite tout crash
    const lang = (window.I18N && window.I18N[state.lang]) ? state.lang : 'ar';
    const isAr = lang === 'ar';

    // (luminosité gérée dans l'effet combiné ci-dessus)

    const cycleBrightness = () => {
      const next = (brightness + 1) % 3;
      setBrightness(next);
      const s = loadState(); s.brightness = next; saveState(s);
    };

    // Bismillah splash — stays until user taps anywhere
    useEffect(() => {
      // No auto-dismiss anymore — user taps to continue
    }, []);

    const setLang = (l) => {
      // n'accepte que les langues disponibles dans I18N
      const safe = (window.I18N && window.I18N[l]) ? l : 'ar';
      const next = { ...state, lang: safe };
      setState(next); saveState(next);
    };
    const finishOnboarding = () => {
      const next = { ...state, onboarded: true };
      setState(next); saveState(next);
      setForceOnboarding(false);
    };

    const go = (r) => {
      if (r === 'onboarding') {
        setForceOnboarding(true);
        setDrawerOpen(false);
        return;
      }
      if (r === 'custom') {
        setShowCustomModal(true);
        setDrawerOpen(false);
        return;
      }
      setRoute(r);
      setDrawerOpen(false);
    };

    // ── Hook de capture App Store (actif uniquement avec ?shot dans l'URL) ──
    React.useEffect(() => {
      if (typeof window === 'undefined' || !/[?&]shot/.test(window.location.search)) return;
      // Sauter toutes les intros pour aller droit aux écrans
      setShowSplash(false); setShowDuaa(false); setShowNiyya(false); setBootDone(true);
      window.__shot = {
        go: (r) => { setShowDuaa(false); setShowNiyya(false); go(r); },
        duaa: () => { setShowDuaa(false); setShowNiyya(false); setRoute('duaa'); },
        niyya: () => { setShowDuaa(false); setShowNiyya(true); },
      };
      return () => { try { delete window.__shot; } catch (e) {} };
    }, []);

    // ── In-app Bismillah splash — auto-dismiss after 2.5s (tap also works) ──
    React.useEffect(() => {
      if (!showSplash) return;
      const t = setTimeout(() => { setShowSplash(false); setShowDuaa(true); }, 2500);
      return () => clearTimeout(t);
    }, [showSplash]);

    // ── Attendre la fin de l'intro Bismillah (boot-intro) avant de chronométrer le Dou'a ──
    React.useEffect(() => {
      if (bootDone) return;
      const onDone = () => setBootDone(true);
      window.addEventListener('boot-intro-done', onDone);
      const fallback = setTimeout(() => setBootDone(true), 7200); // filet de sécurité
      return () => { window.removeEventListener('boot-intro-done', onDone); clearTimeout(fallback); };
    }, [bootDone]);

    // ── Daily Dou'a splash — apparaît APRÈS l'intro, reste ~5s puis laisse place à la niyya ──
    React.useEffect(() => {
      if (!showDuaa || !bootDone) return;
      const t = setTimeout(() => setShowDuaa(false), 7000);
      return () => clearTimeout(t);
    }, [showDuaa, bootDone]);

    if (showSplash) {
      const dismiss = () => { setShowSplash(false); setShowDuaa(true); };
      return (
        <div
          style={{ ...frameStyle(), cursor:'pointer' }}
          onClick={dismiss}
          onPointerDown={dismiss}
          onTouchStart={dismiss}
        >
          <window.Splash phase={0} lang={lang} />
          {/* Full-screen tap catcher — receives all events, ignores child pointer-events */}
          <div
            onClick={dismiss}
            onPointerDown={dismiss}
            onTouchStart={dismiss}
            style={{
              position:'absolute', inset:0, zIndex:9999,
              cursor:'pointer', WebkitTapHighlightColor:'transparent',
              background:'transparent',
            }}
          />
          {/* Hint at bottom — "tap to continue" */}
          <div style={{
            position:'absolute', bottom: 16, left:0, right:0, textAlign:'center',
            fontFamily:'Inter, sans-serif', fontSize:11, letterSpacing:'0.4em',
            color:'rgba(232,200,140,0.85)', textTransform:'uppercase', pointerEvents:'none',
            animation:'tapHint 2.2s ease-in-out infinite',
            zIndex: 10000, fontWeight:500,
          }}>
            {isAr ? '· اضغط للمتابعة ·' : '· Tap to continue ·'}
          </div>
          <style>{`@keyframes tapHint { 0%, 100% { opacity: 0.5 } 50% { opacity: 1 } }`}</style>
        </div>
      );
    }

    // ── Daily Dou'a splash (random, tap to continue, auto-dismiss after 6s) ──
    if (showDuaa) {
      return (
        <div style={frameStyle()}>
          <window.DuaaScreen lang={lang} randomDuaa={false} onTap={() => setShowDuaa(false)} />
        </div>
      );
    }

    // —— Niyya (intention) — s'affiche AVANT le compteur, à chaque ouverture ; menu identique aux autres pages ; fin → direct au 3adad ——
    if (showNiyya || forceOnboarding || !state.onboarded) {
      const leaveNiyya = () => {
        if (!state.onboarded) finishOnboarding();
        // À l'ouverture, le compteur démarre toujours sur سبحان الله (index 0)
        try { const s = loadState(); s.dhikrIdx = 0; saveState(s); } catch (_) {}
        setForceOnboarding(false);
        setShowNiyya(false);
      };
      return (
        <div style={frameStyle()}>
          <FirstRun
            lang={lang}
            setLang={setLang}
            onDone={() => { leaveNiyya(); setRoute('compteur'); }}
            onMenu={() => setDrawerOpen(true)}
            onBrightness={cycleBrightness}
          />
          <NavDrawer
            open={drawerOpen}
            lang={lang}
            isAr={isAr}
            onClose={() => setDrawerOpen(false)}
            onGo={(r) => {
              if (r === 'onboarding') { setDrawerOpen(false); return; }
              leaveNiyya();
              go(r);
            }}
          />
        </div>
      );
    }

    return (
      <div style={frameStyle()}>
        {/* Main routes */}
        {route === 'compteur' && (
          <CompteurView
            lang={lang}
            onMenu={() => setDrawerOpen(true)}
            onCycleBrightness={cycleBrightness}
          />
        )}
        {route === 'library' && (
          <ScreenWithBack onBack={() => go('compteur')} isAr={isAr} backTop={64}>
            <window.LibraryScreen lang={lang}
              onAddDhikr={() => { setEditingDhikr(null); setShowCustomModal(true); }}
              onEdit={(d) => { setEditingDhikr(d); setShowCustomModal(true); }} />
          </ScreenWithBack>
        )}
        {route === 'history' && (
          <ScreenWithBack onBack={() => go('compteur')} isAr={isAr} backTop={74}>
            <window.HistoryScreen lang={lang} />
          </ScreenWithBack>
        )}
        {route === 'community' && (
          <ScreenWithBack onBack={() => go('compteur')} isAr={isAr} backTop={24}>
            <window.CommunityScreen lang={lang} />
          </ScreenWithBack>
        )}
        {route === 'prayer' && (
          <ScreenWithBack onBack={() => go('compteur')} isAr={isAr} bare={true}>
            <window.PrayerScreen lang={lang} />
          </ScreenWithBack>
        )}
        {route === 'qibla' && (
          <ScreenWithBack onBack={() => go('compteur')} isAr={isAr}>
            <window.QiblaScreen lang={lang} />
          </ScreenWithBack>
        )}
        {route === 'adhkar' && (
          <ScreenWithBack onBack={() => go('compteur')} isAr={isAr} backTop={70}>
            <window.AdhkarScreen lang={lang} />
          </ScreenWithBack>
        )}
        {route === 'duaa' && (
          <ScreenWithBack onBack={() => go('compteur')} isAr={isAr}>
            <window.DuaaScreen lang={lang} />
          </ScreenWithBack>

        {route === 'custom' && (

            <window.CustomDhikrModal lang={lang} onClose={() => go('compteur')} />

        {route === 'settings' && (

  // ─── Viewport fit: scale 402×874 design to phone viewport ──────────
  function useScale() {
    const [info, setInfo] = useState({ scale: 1, framed: false });
    useEffect(() => {
      function fit() {
        const W = window.innerWidth, H = window.innerHeight;
        // Grand écran (ordinateur) → cadre iPhone centré (« contain »)
        // Petit écran (vrai téléphone / Xcode) → plein écran (« cover »)
        const framed = W >= 480 && H >= 480 && (W > 520 || H > 920);
        if (framed) {
          const s = Math.min((H - 56) / 874, (W - 56) / 402, 1.05);
          setInfo({ scale: s, framed: true });
        } else {
          const s = Math.max(W / 402, H / 874);
          setInfo({ scale: s, framed: false });
        }
      }
      fit();
      window.addEventListener('resize', fit);
      window.addEventListener('orientationchange', fit);
      return () => {
        window.removeEventListener('resize', fit);
        window.removeEventListener('orientationchange', fit);
      };
    }, []);
    return info;
  }

  function frameStyle() {
    // returns the inner canvas style (relative positioning context for screens)
    return {
      position:'absolute', top:0, left:0,
      width: 402, height: 874,
      overflow:'hidden',
      background:'#000',
    };
  }

  function Root() {
    const { scale, framed } = useScale();
    const [ready, setReady] = useState(false);
    useEffect(() => {
      // Wait for fonts and ASSETS to be ready
      const tick = () => {
        if (window.THEME && window.I18N && window.CompteurV1 && window.CompteurV2 && window.CompteurV3
            && window.LibraryScreen && window.Splash && window.Onboarding) {
          setReady(true);
        } else {
          setTimeout(tick, 50);
        }
      };
      tick();
    }, []);
    if (!ready) {
      return (
        <div style={{
          position:'fixed', inset:0, background:'#0B0D10',
          display:'flex', alignItems:'center', justifyContent:'center',
          color:'#C7A55B', fontFamily:'serif', fontSize:14, letterSpacing:'0.3em',
        }}>· · ·</div>
      );
    }
    const W = 402, H = 874;
    // ── Mode capture App Store : rendu propre 402×874 (ajusté à la fenêtre), sans bezel ──
    if (typeof window !== 'undefined' && /[?&]shot/.test(window.location.search)) {
      const sc = Math.min(window.innerWidth / 402, window.innerHeight / 874);
      return (
        <div style={{ position:'fixed', inset:0, background:'#000', overflow:'hidden' }}>
          <div style={{ position:'absolute', top:0, left:0, width:402, height:874,
                        transform:`scale(${sc})`, transformOrigin:'top left' }}>
            <MisbahaApp />
          </div>
        </div>
      );
    }
    const canvas = (
      <div style={{
        position:'relative',
        width: W * scale,
        height: H * scale,
        overflow:'hidden',
        borderRadius: framed ? 40 : 0,
        background:'#000',
      }}>
        {framed && (
          <div style={{
            position:'absolute', top:0, left:'50%', transform:'translateX(-50%)',
            width:118, height:27, background:'#000', borderRadius:'0 0 17px 17px',
            zIndex:99999, pointerEvents:'none',
          }} />
        )}
        <div style={{
          position:'absolute', top:0, left:0,
          width: W, height: H,
          transform: `scale(${scale})`,
          transformOrigin: 'top left',
        }}>
          <MisbahaApp />
        </div>
      </div>
    );
    if (framed) {
      return (
        <div style={{
          position:'fixed', inset:0,
          background:'radial-gradient(120% 90% at 50% 0%, #101a31 0%, #070d1c 60%)',
          overflow:'hidden',
          display:'flex', alignItems:'center', justifyContent:'center',
        }}>
          <div style={{
            position:'relative', padding:13, borderRadius:52,
            background:'linear-gradient(160deg,#23252b,#0c0d10)',
            boxShadow:'0 50px 110px -30px rgba(0,0,0,.95), inset 0 0 0 2px rgba(255,255,255,.05)',
          }}>
            {canvas}
          </div>
        </div>
      );
    }
    return (
      <div style={{
        position:'fixed', inset:0, background:'transparent',
        overflow:'hidden',
        display:'flex', alignItems:'center', justifyContent:'center',
      }}>
        {canvas}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  // Retirer l'écran de démarrage statique une fois React peint (fondu transparent vers le vrai splash)
  requestAnimationFrame(() => { requestAnimationFrame(() => { setTimeout(() => {
    const bs = document.getElementById('boot-splash');
    if (bs) { bs.style.opacity = '0'; setTimeout(() => bs.remove(), 650); }
  }, 350); }); });
})();
</script></body></html>
